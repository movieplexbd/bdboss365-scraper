name: Daily BDboss365 Scraper

on:
  schedule:
    - cron: '0 18 * * *'    # প্রতিদিন রাত ১২টা (BD time)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scraper.py

name: Daily BDboss365 Scraper

on:
  schedule:
    - cron: '0 18 * * *'    # প্রতিদিন রাত ১২টা (BD time)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 এই স্টেপটা নতুন যোগ করা হয়েছে (GitHub Secret থেকে key তৈরি)
      - name: Create service-account.json from secret
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py
